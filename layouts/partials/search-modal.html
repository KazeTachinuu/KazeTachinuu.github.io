<!-- Fast Search Modal -->
<div id="fastSearch" class="search-modal" role="dialog" aria-modal="true" aria-labelledby="search-title" aria-hidden="true">
  <div class="search-backdrop"></div>
  <div class="search-container">
    <div class="search-header">
      <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
      <input type="search"
             id="searchInput"
             class="search-input"
             placeholder="Search..."
             autocomplete="off"
             spellcheck="false"
             aria-label="Search site content">
      <button type="button" class="search-close" onclick="closeSearchModal()" aria-label="Close search">
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>
    </div>
    <ul id="searchResults" class="search-results" role="listbox"></ul>
    <div class="search-footer">
      <span class="search-hint"><kbd>↑</kbd><kbd>↓</kbd> Navigate</span>
      <span class="search-hint"><kbd>↵</kbd> Open</span>
      <span class="search-hint"><kbd>ESC</kbd> Close</span>
    </div>
  </div>
</div>

<style>
/* Fast Search Modal Styles */
.search-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 10000;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 10vh 1rem 1rem;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.search-modal.is-open {
  display: flex;
  opacity: 1;
}

.search-backdrop {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.search-container {
  position: relative;
  width: 100%;
  max-width: 640px;
  max-height: 70vh;
  background: var(--card-bg, #ffffff);
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateY(-20px) scale(0.96);
  opacity: 0;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}

.search-modal.is-open .search-container {
  transform: translateY(0) scale(1);
  opacity: 1;
}

.search-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 1rem;
  border-bottom: 1px solid var(--card-border, #e5e7eb);
}

.search-icon {
  color: var(--text-color-muted, #9ca3af);
  flex-shrink: 0;
  font-size: 20px;
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 1rem;
  line-height: 1.5;
  color: var(--text-color, #1f2937);
  outline: none;
  font-family: inherit;
}

.search-input::placeholder {
  color: var(--text-color-muted, #9ca3af);
}

.search-close {
  background: none;
  border: none;
  padding: 0.5rem;
  cursor: pointer;
  color: var(--text-color-muted, #9ca3af);
  border-radius: 6px;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.search-close i {
  font-size: 20px;
}

.search-close:hover {
  background: var(--card-hover-bg, #f3f4f6);
  color: var(--text-color, #1f2937);
}

.search-results {
  flex: 1;
  overflow-y: auto;
  padding: 0.5rem;
  list-style: none;
  margin: 0;
}

.search-results::-webkit-scrollbar {
  width: 8px;
}

.search-results::-webkit-scrollbar-thumb {
  background: var(--card-border, #e5e7eb);
  border-radius: 4px;
}

.search-results li {
  margin-bottom: 0.25rem;
}

.search-results a {
  display: block;
  padding: 0.75rem;
  border-radius: 8px;
  text-decoration: none;
  color: var(--text-color);
  border: 1px solid transparent;
  transition: all 0.15s ease;
}

.search-results a:hover,
.search-results a:focus {
  background: var(--card-hover-bg, #f9fafb);
  border-color: var(--link-color, #3b82f6);
  outline: none;
}

.search-result-title {
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--heading-color, #111827);
  margin-bottom: 0.25rem;
}

.search-result-title mark {
  background: rgba(59, 130, 246, 0.15);
  color: var(--link-color, #3b82f6);
  padding: 0.1rem 0.2rem;
  border-radius: 3px;
}

.search-result-meta {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  flex-wrap: wrap;
  font-size: 0.75rem;
  color: var(--text-color-muted, #9ca3af);
  margin-bottom: 0.25rem;
}

.search-result-section,
.search-result-categories,
.search-result-date {
  padding: 0.125rem 0.375rem;
  background: var(--card-hover-bg, #f3f4f6);
  border-radius: 3px;
  font-weight: 500;
}

.search-result-categories {
  color: var(--link-color, #3b82f6);
}

.search-result-summary {
  font-size: 0.85rem;
  color: var(--text-color, #6b7280);
  line-height: 1.4;
}

.search-result-summary mark {
  background: rgba(59, 130, 246, 0.15);
  color: var(--link-color, #3b82f6);
  font-weight: 500;
  padding: 0.1rem 0.2rem;
  border-radius: 3px;
}

.search-result-tags-row {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 0.5rem;
  font-size: 0.75rem;
}

.search-result-tags {
  color: var(--text-color-muted, #9ca3af);
  font-weight: 500;
}

.search-message {
  padding: 2rem;
  text-align: center;
  color: var(--text-color-muted, #9ca3af);
  font-size: 0.9rem;
}

.search-footer {
  padding: 0.75rem 1rem;
  border-top: 1px solid var(--card-border, #e5e7eb);
  background: var(--card-hover-bg, #f9fafb);
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

.search-hint {
  display: flex;
  align-items: center;
  gap: 0.375rem;
  font-size: 0.75rem;
  color: var(--text-color-muted, #9ca3af);
  font-weight: 500;
}

.search-hint kbd {
  padding: 0.25rem 0.5rem;
  background: var(--card-bg, #ffffff);
  border: 1px solid var(--card-border, #e5e7eb);
  border-radius: 4px;
  font-size: 0.7rem;
  font-family: monospace;
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
  min-width: 24px;
  text-align: center;
}

/* Dark Mode */
[data-theme="dark"] .search-container {
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
}

[data-theme="dark"] .search-backdrop {
  background: rgba(0, 0, 0, 0.85);
}

/* Mobile */
@media (max-width: 640px) {
  .search-modal {
    padding: 4vh 0.5rem 0.5rem;
  }

  .search-container {
    max-height: 85vh;
    border-radius: 8px;
  }

  .search-input {
    font-size: 16px; /* Prevents iOS zoom */
  }

  .search-hint {
    font-size: 0.7rem;
  }
}
</style>

<script src="/js/fastsearch.js"></script>
