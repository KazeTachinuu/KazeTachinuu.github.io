{{ define "main" }}
{{ partial "page-title.html" . }}

<section class="uk-section uk-section-small">
  <div class="uk-container">
    <!-- Search -->
    <div class="uk-margin-medium-bottom">
      <div class="uk-width-1-3@m uk-margin-auto">
        <div class="uk-inline uk-width-1-1">
          <span class="uk-form-icon" uk-icon="icon: search"></span>
          <input class="uk-input uk-form-small" type="text" id="searchInput" placeholder="Search blog..." aria-label="Search blog">
        </div>
      </div>
    </div>

    <!-- Posts Grid -->
    <div class="uk-grid uk-child-width-1-3@m uk-child-width-1-2@s uk-grid-medium" uk-grid uk-height-match="target: > div > a > .uk-card">
      {{ range .Data.Pages.ByPublishDate }}
      <div class="blog-item">
        <a href="{{ .Permalink | relURL }}" class="uk-link-reset">
          <div class="uk-card uk-card-default uk-card-hover uk-border-rounded">
            <div class="uk-card-header">
              <div class="uk-grid-small uk-flex-middle" uk-grid>
                <div class="uk-width-expand">
                  <h3 class="uk-card-title uk-margin-remove-bottom">{{ .Title }}</h3>
                  <p class="uk-text-meta uk-margin-remove-top"><time datetime="{{ .Date }}">{{ .Date.Format "Jan 2, 2006" }}</time></p>
                </div>
              </div>
            </div>
            <div class="uk-card-body">
              <p class="blog-description">{{ .Params.description }}</p>
            </div>
            <div class="uk-card-footer">
              <span class="uk-button uk-button-text">Read more</span>
            </div>
          </div>
        </a>
      </div>
      {{ end }}
    </div>

    <div id="noResults" class="uk-text-center uk-margin-large-top uk-hidden">
      <span class="uk-text-muted">No posts found</span>
    </div>
  </div>
</section>

<style>
/* Card styles match theme look */
.uk-card { background-color: var(--card-bg); border: 1px solid var(--card-border); transition: all 0.2s ease; }
@media (hover: hover) { .uk-card:hover { transform: translateY(-2px); border-color: var(--link-color); box-shadow: 0 2px 8px var(--card-shadow); background-color: var(--card-hover-bg);} }
.uk-card-title { color: var(--card-heading) !important; font-size: 1.1rem !important; line-height: 1.4; }

/* Search input styling */
.uk-input.uk-form-small { height: 32px; border-radius: 6px; background-color: var(--card-hover-bg) !important; border: 1px solid var(--card-border) !important; color: var(--text-color) !important; font-size: 0.875rem; padding-left: 32px; }
.uk-input.uk-form-small:focus { background-color: var(--card-bg) !important; border-color: var(--link-color) !important; }
.uk-form-icon { color: var(--text-color-muted); width: 32px; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const input = document.getElementById('searchInput');
  const items = Array.from(document.querySelectorAll('.blog-item'));
  const noResults = document.getElementById('noResults');

  function filter() {
    const term = input.value.trim().toLowerCase();
    let visible = 0;
    items.forEach(item => {
      const title = item.querySelector('.uk-card-title')?.textContent.toLowerCase() || '';
      const desc = item.querySelector('.blog-description')?.textContent.toLowerCase() || '';
      const match = term === '' || title.includes(term) || desc.includes(term);
      item.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    if (noResults) noResults.classList.toggle('uk-hidden', visible !== 0);
  }

  input.addEventListener('input', filter);
});
</script>

{{ end }}
